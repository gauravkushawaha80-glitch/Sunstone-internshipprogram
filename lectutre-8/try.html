<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Shape - Selected</title>
<style>
  * { box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  .canvas-wrapper {
    position: relative;
    width: 320px;
    height: 320px;
  }

  /* Selection bounding box around the heart */
  .selection-box {
    position: absolute;
    top: 70px;
    left: 20px;
    width: 100px;
    height: 100px;
    border: 1.5px solid #6C5CE7;
    border-radius: 2px;
  }

  /* Corner / edge resize handles */
  .handle {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #ffffff;
    border: 1.5px solid #6C5CE7;
    border-radius: 50%;
  }
  .handle.tl { top: -5px; left: -5px; }
  .handle.tr { top: -5px; right: -5px; }
  .handle.bl { bottom: -5px; left: -5px; }
  .handle.br { bottom: -5px; right: -5px; }
  .handle.tm { top: -5px; left: 50%; transform: translateX(-50%); }
  .handle.bm { bottom: -5px; left: 50%; transform: translateX(-50%); }
  .handle.lm { top: 50%; left: -5px; transform: translateY(-50%); }
  .handle.rm { top: 50%; right: -5px; transform: translateY(-50%); }

  /* Toolbar floating above the selection */
  .toolbar {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
    background: #ffffff;
    border-radius: 999px;
    padding: 6px 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
  }

  .toolbar button {
    border: none;
    background: transparent;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #444;
    transition: background 0.15s ease;
  }
  .toolbar button:hover {
    background: #f1f1f3;
  }
  .toolbar button svg {
    width: 18px;
    height: 18px;
  }

  .toolbar .divider {
    width: 1px;
    height: 20px;
    background: #e5e5e8;
    margin: 0 2px;
  }

  /* The heart shape itself */
  .heart-shape {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 100px;
    height: 200px;
  }
</style>
</head>
<body>

  <div class="canvas-wrapper">

    <!-- Toolbar -->
    <div class="toolbar">
      <button title="Repeat / Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      </button>
      <button title="Lock">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </button>
      <button title="Duplicate / Copy">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
      <button title="Delete">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
      <div class="divider"></div>
      <button title="More options">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
      </button>
    </div>

    <!-- Heart shape -->
    <svg class="heart-shape" viewBox="0 0 280 240" xmlns="http://www.w3.org/2000/svg">
      <path d="M140,235
               C140,235 10,150 10,75
               C10,30 48,5 85,5
               C110,5 130,20 140,45
               C150,20 170,5 195,5
               C232,5 270,30 270,75
               C270,150 140,235 140,235 Z"
            fill="#F5371F"/>
    </svg>

    <!-- Selection box with handles -->
    <div class="selection-box">
      <div class="handle tl"></div>
      <div class="handle tr"></div>
      <div class="handle bl"></div>
      <div class="handle br"></div>
      <div class="handle tm"></div>
      <div class="handle bm"></div>
      <div class="handle lm"></div>
      <div class="handle rm"></div>
    </div>

  </div>

</body>
</html>
