<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background: #f0f0f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 150px);
    grid-template-rows: repeat(2, 150px);
    gap: 40px;
    background: white;
    padding: 40px;
    border-radius: 10px;
  }

  .shape-box {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Circle */
  .circle {
    width: 130px;
    height: 130px;
    background: #c6f15f;
    border-radius: 50%;
  }

  /* Square */
  .square {
    width: 130px;
    height: 130px;
    background: #ffd95e;
  }

  /* Triangle */
  .triangle {
    width: 0;
    height: 0;
    border-left: 70px solid transparent;
    border-right: 70px solid transparent;
    border-bottom: 130px solid #ff7a1a;
  }

  /* Pentagon */
  .pentagon {
    width: 130px;
    height: 130px;
    background: #2d2db0;
    clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
  }

  /* Cross / Plus */
  .cross {
    width: 130px;
    height: 130px;
    background: #1a1a1a;
    clip-path: polygon(
      35% 0%, 65% 0%, 65% 35%, 100% 35%, 100% 65%,
      65% 65%, 65% 100%, 35% 100%, 35% 65%, 0% 65%, 0% 35%, 35% 35%
    );
  }

  /* Parallelogram */
  .parallelogram {
    width: 150px;
    height: 130px;
    background: #c46cf0;
    clip-path: polygon(25% 0%, 100% 0%, 75% 100%, 0% 100%);
  }

  /* Arrow (Up) */
  .arrow {
    width: 130px;
    height: 130px;
    background: #6c4cf0;
    clip-path: polygon(
      50% 0%, 100% 50%, 70% 50%, 70% 100%, 30% 100%, 30% 50%, 0% 50%
    );
  }

  /* Heart */
  .heart-wrapper{
display:flex;
justify-content:center;
align-items:center;

}

.heart{
position:relative;
width: 100px;
height:100px;
background:red;
transform:rotate(-45deg);
border:1px seagreen;
}

.heart::before,
.heart::after{
content:"";
position:absolute;
width:100px;
height:100px;
background:red;
border-radius:50%;
}

.heart::before{
top:-50px;
left:0;
}

.heart::after{
left: 50px;
top:0;
}

</style>
</head>
<body>

<div class="grid">
  <div class="shape-box"><div class="circle"></div></div>
  <div class="shape-box"><div class="square"></div></div>
  <div class="shape-box"><div class="triangle"></div></div>
  <div class="shape-box"><div class="pentagon"></div></div>

  <div class="shape-box"><div class="cross"></div></div>
  <div class="shape-box"><div class="parallelogram"></div></div>
  <div class="shape-box"><div class="arrow"></div></div>
  <div class="shape-box"><div class="heart"></div></div>
</div>

</body>
</html>
