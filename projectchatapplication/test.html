<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Box</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone">

    <!-- Header -->
    <div class="header">
        <h2>Chat Box</h2>

        <!-- Stories -->
        <div class="stories">

            <div class="story">
                <img src="https://i.pravatar.cc/60?img=1">
            </div>

            <div class="story">
                <img src="https://i.pravatar.cc/60?img=2">
            </div>

            <div class="story">
                <img src="https://i.pravatar.cc/60?img=3">
            </div>

            <div class="story">
                <img src="https://i.pravatar.cc/60?img=4">
            </div>

            <div class="story">
                <img src="https://i.pravatar.cc/60?img=5">
            </div>

        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <span class="active">All</span>
        <span>Unread</span>
        <span>Archived</span>
    </div>

    <!-- Chat List -->
    <div class="chat-list">

        <div class="chat">
            <img src="https://i.pravatar.cc/60?img=10">

            <div class="details">
                <h3>Eleanor Pena</h3>
                <p>That's awesome!</p>
            </div>

            <div class="time">
                8:00 PM
                <div class="badge">3</div>
            </div>
        </div>

        <div class="chat">
            <img src="https://i.pravatar.cc/60?img=20">

            <div class="details">
                <h3>Bessie Cooper</h3>
                <p>See you tomorrow.</p>
            </div>

            <div class="time">
                7:30 PM
                <i class="fa-solid fa-check-double"></i>
            </div>
        </div>

        <div class="chat">
            <img src="https://i.pravatar.cc/60?img=30">

            <div class="details">
                <h3>Jenny Wilson</h3>
                <p>Typing...</p>
            </div>

            <div class="time">
                6:00 PM
            </div>
        </div>

        <div class="chat">
            <img src="https://i.pravatar.cc/60?img=40">

            <div class="details">
                <h3>Robert Fox</h3>
                <p>Hello there!</p>
            </div>

            <div class="time">
                4:30 PM
            </div>
        </div>

    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">

        <div class="icon">
            <i class="fa-solid fa-house"></i>
        </div>

        <div class="icon">
            <i class="fa-solid fa-heart"></i>
        </div>

        <div class="center-btn">
            <i class="fa-solid fa-bars"></i>
        </div>

        <div class="icon">
            <i class="fa-solid fa-comment"></i>
        </div>

        <div class="icon">
            <i class="fa-solid fa-user"></i>
        </div>

    </div>

</div>

</body>
</html>
